<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Rewind Runner — Mebbols</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
  html, body { height: 100%; background: #0a0e27; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #fff; }
  #game { display: block; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #1a1f3a 0%, #0a0e27 100%); }
  #hud { position: fixed; top: 16px; left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; font-size: 18px; font-weight: 600; text-shadow: 0 2px 6px rgba(0,0,0,0.6); }
  #score { font-size: 32px; }
  #rewind-meter { width: 120px; height: 12px; background: rgba(255,255,255,0.15); border-radius: 6px; overflow: hidden; margin-top: 8px; }
  #rewind-fill { height: 100%; background: linear-gradient(90deg, #ff9e2c, #ffd35c); width: 0%; transition: width 0.1s linear; }
  #rewind-btn { position: fixed; bottom: 24px; right: 24px; width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #ff9e2c, #ff5e3a); border: none; color: white; font-size: 28px; font-weight: 700; box-shadow: 0 6px 20px rgba(255,94,58,0.4); cursor: pointer; pointer-events: auto; opacity: 0.4; transition: opacity 0.2s; }
  #rewind-btn.ready { opacity: 1; }
  #rewind-btn:active { transform: scale(0.95); }
  #overlay { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(10,14,39,0.92); backdrop-filter: blur(10px); padding: 40px; text-align: center; z-index: 10; }
  #overlay h1 { font-size: 48px; margin-bottom: 12px; background: linear-gradient(135deg, #ff9e2c, #ffd35c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  #overlay p { font-size: 16px; opacity: 0.8; max-width: 380px; line-height: 1.5; margin-bottom: 24px; }
  #overlay .ctrl { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; }
  #overlay .key { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 8px 14px; font-size: 13px; }
  #overlay button { background: linear-gradient(135deg, #ff9e2c, #ff5e3a); border: none; color: white; padding: 16px 36px; font-size: 18px; font-weight: 700; border-radius: 30px; cursor: pointer; box-shadow: 0 6px 20px rgba(255,94,58,0.4); }
  #overlay button:active { transform: scale(0.97); }
  #overlay.hidden { display: none; }
  #final-score { font-size: 22px; margin-bottom: 8px; }
  .game-over h1 { color: #ff5e3a; -webkit-text-fill-color: #ff5e3a; }
  .credit { position: fixed; bottom: 12px; left: 12px; font-size: 11px; opacity: 0.4; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div>
    <div id="score">0m</div>
    <div id="rewind-meter"><div id="rewind-fill"></div></div>
  </div>
  <div id="combo" style="font-size:14px; opacity:0.7;"></div>
</div>
<button id="rewind-btn">↺</button>

<div id="overlay">
  <h1 id="overlay-title">Rewind Runner</h1>
  <p id="overlay-text">Eindeloos rennen. Eén rewind per 30 sec — gebruik 'm slim.</p>
  <div class="ctrl">
    <span class="key">← →</span>
    <span class="key">↑ Spring</span>
    <span class="key">↺ Rewind</span>
  </div>
  <p id="final-score" style="display:none;"></p>
  <button id="start-btn">Start</button>
</div>
<div class="credit">Mebbols · Daily Snack</div>

<script>
"use strict";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const rewindFill = document.getElementById("rewind-fill");
const rewindBtn = document.getElementById("rewind-btn");
const overlay = document.getElementById("overlay");
const overlayTitle = document.getElementById("overlay-title");
const overlayText = document.getElementById("overlay-text");
const startBtn = document.getElementById("start-btn");
const finalScoreEl = document.getElementById("final-score");
const comboEl = document.getElementById("combo");

let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();

const LANES = 3;
const COLORS = { bg1:"#1a1f3a", bg2:"#0a0e27", player:"#ffd35c", obstacle:"#ff5e3a", coin:"#ffd35c", lane:"rgba(255,255,255,0.06)", ghost:"rgba(255,211,92,0.25)" };

const state = {
  running: false,
  gameOver: false,
  rewinding: false,
  distance: 0,
  speed: 6,
  lane: 1,
  laneX: 0,
  targetLaneX: 0,
  y: 0,
  vy: 0,
  jumping: false,
  obstacles: [],
  coins: [],
  rewindCharge: 0,
  rewindBuffer: [],
  ghostPath: null,
  combo: 0,
  particles: [],
};

const G = 0.7;
const JUMP_V = -14;
const REWIND_MAX_FRAMES = 90;
const REWIND_COOLDOWN_FRAMES = 30 * 30;

function laneToX(lane) { return W * (0.2 + lane * 0.3); }

function reset() {
  state.running = true; state.gameOver = false; state.rewinding = false;
  state.distance = 0; state.speed = 6; state.lane = 1; state.laneX = laneToX(1); state.targetLaneX = state.laneX;
  state.y = 0; state.vy = 0; state.jumping = false;
  state.obstacles = []; state.coins = [];
  state.rewindCharge = 0; state.rewindBuffer = []; state.ghostPath = null;
  state.combo = 0; state.particles = [];
  overlay.classList.add("hidden");
}

function spawnObstacle() {
  const lane = Math.floor(Math.random() * LANES);
  const type = Math.random() < 0.7 ? "block" : "low";
  state.obstacles.push({ lane, x: laneToX(lane), z: 1000, type });
}
function spawnCoin() {
  const lane = Math.floor(Math.random() * LANES);
  state.coins.push({ lane, x: laneToX(lane), z: 1000 });
}

let spawnTimer = 0;
function update() {
  if (!state.running) return;

  if (state.rewinding) {
    if (state.rewindBuffer.length > 1) {
      const snap = state.rewindBuffer.pop();
      state.distance = snap.distance;
      state.laneX = snap.laneX;
      state.y = snap.y;
      state.lane = snap.lane;
      state.obstacles = snap.obstacles.map(o => ({...o}));
      state.coins = snap.coins.map(c => ({...c}));
    } else {
      state.rewinding = false;
      state.rewindCharge = 0;
      rewindBtn.classList.remove("ready");
    }
    return;
  }

  state.speed = 6 + Math.min(state.distance / 400, 8);
  state.distance += state.speed * 0.1;

  if (state.targetLaneX !== state.laneX) {
    const diff = state.targetLaneX - state.laneX;
    state.laneX += diff * 0.25;
    if (Math.abs(diff) < 1) state.laneX = state.targetLaneX;
  }

  if (state.jumping) {
    state.vy += G;
    state.y += state.vy;
    if (state.y >= 0) { state.y = 0; state.vy = 0; state.jumping = false; }
  }

  for (const o of state.obstacles) o.z -= state.speed * 8;
  for (const c of state.coins) c.z -= state.speed * 8;
  state.obstacles = state.obstacles.filter(o => o.z > -100);
  state.coins = state.coins.filter(c => c.z > -100);

  const playerZ = 0, hitZ = 40;
  for (const o of state.obstacles) {
    if (o.z < hitZ && o.z > -hitZ && o.lane === state.lane) {
      if (o.type === "block" && state.y > -50) { return gameOver(); }
      if (o.type === "low" && state.y === 0) { return gameOver(); }
    }
  }
  for (let i = state.coins.length - 1; i >= 0; i--) {
    const c = state.coins[i];
    if (c.z < hitZ && c.z > -hitZ && c.lane === state.lane && state.y > -120 && state.y <= 0) {
      state.coins.splice(i, 1);
      state.combo++;
      state.distance += 5;
      addParticles(c.x, H * 0.7);
      if (state.rewindCharge < REWIND_COOLDOWN_FRAMES) state.rewindCharge += 30;
    }
  }

  spawnTimer++;
  const spawnInterval = Math.max(28 - Math.floor(state.distance / 200), 14);
  if (spawnTimer > spawnInterval) {
    spawnTimer = 0;
    if (Math.random() < 0.7) spawnObstacle();
    if (Math.random() < 0.4) spawnCoin();
  }

  if (state.rewindCharge < REWIND_COOLDOWN_FRAMES) {
    state.rewindCharge++;
    if (state.rewindCharge >= REWIND_COOLDOWN_FRAMES) rewindBtn.classList.add("ready");
  }

  state.rewindBuffer.push({
    distance: state.distance, laneX: state.laneX, y: state.y, lane: state.lane,
    obstacles: state.obstacles.map(o => ({...o})), coins: state.coins.map(c => ({...c}))
  });
  if (state.rewindBuffer.length > REWIND_MAX_FRAMES) state.rewindBuffer.shift();

  for (const p of state.particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life--; }
  state.particles = state.particles.filter(p => p.life > 0);
}

function addParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    state.particles.push({ x, y, vx: (Math.random() - 0.5) * 6, vy: -Math.random() * 6 - 2, life: 25, color: "#ffd35c" });
  }
}

function gameOver() {
  state.running = false;
  state.gameOver = true;
  overlay.classList.remove("hidden");
  overlayTitle.textContent = "Game Over";
  overlayText.textContent = "Probeer opnieuw — sneller deze keer.";
  document.querySelector("#overlay").classList.add("game-over");
  finalScoreEl.style.display = "block";
  finalScoreEl.textContent = `Score: ${Math.floor(state.distance)}m`;
  startBtn.textContent = "Opnieuw";
}

function startRewind() {
  if (state.rewindCharge < REWIND_COOLDOWN_FRAMES || state.rewinding || !state.running) return;
  state.rewinding = true;
}
function stopRewind() { state.rewinding = false; }

function render() {
  ctx.fillStyle = COLORS.bg2;
  ctx.fillRect(0, 0, W, H);

  const horizonY = H * 0.35;
  ctx.fillStyle = COLORS.bg1;
  ctx.fillRect(0, 0, W, horizonY);

  for (let i = 0; i < LANES; i++) {
    const lx = laneToX(i);
    ctx.beginPath();
    ctx.moveTo(lx, horizonY);
    ctx.lineTo(lx + (lx - W/2) * 4, H);
    ctx.strokeStyle = COLORS.lane;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  const groundOffset = (state.distance * 8) % 60;
  for (let z = horizonY; z < H; z += 60) {
    const t = (z - horizonY) / (H - horizonY);
    const y = z + (groundOffset * t);
    if (y > H) continue;
    ctx.strokeStyle = `rgba(255,255,255,${0.04 + t * 0.05})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W * 0.05, y);
    ctx.lineTo(W * 0.95, y);
    ctx.stroke();
  }

  const sorted = [...state.obstacles, ...state.coins].sort((a, b) => b.z - a.z);
  for (const item of sorted) {
    const z = item.z;
    if (z < -50) continue;
    const t = Math.max(0, Math.min(1, 1 - z / 1000));
    const sx = laneToX(item.lane);
    const x = W/2 + (sx - W/2) * t;
    const y = horizonY + (H - horizonY) * t;
    const size = 12 + t * 60;

    if ("type" in item) {
      ctx.fillStyle = COLORS.obstacle;
      if (item.type === "block") {
        ctx.fillRect(x - size/2, y - size, size, size);
      } else {
        ctx.fillRect(x - size, y - size/3, size * 2, size/3);
      }
    } else {
      ctx.fillStyle = COLORS.coin;
      ctx.beginPath();
      ctx.arc(x, y - size/2, size/3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.beginPath();
      ctx.arc(x - size/8, y - size/2 - size/8, size/10, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const px = state.laneX;
  const py = H * 0.78 + state.y;
  ctx.fillStyle = COLORS.player;
  ctx.beginPath();
  ctx.arc(px, py - 30, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(px - 12, py - 18, 24, 36);
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.beginPath();
  ctx.ellipse(px, H * 0.78 + 4, 22, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  if (state.rewinding) {
    ctx.fillStyle = "rgba(255,158,44,0.12)";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#ff9e2c";
    ctx.font = "bold 48px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("REWIND", W/2, H/2);
  }

  for (const p of state.particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 25;
    ctx.fillRect(p.x, p.y, 4, 4);
  }
  ctx.globalAlpha = 1;

  scoreEl.textContent = Math.floor(state.distance) + "m";
  rewindFill.style.width = (state.rewindCharge / REWIND_COOLDOWN_FRAMES * 100) + "%";
  comboEl.textContent = state.combo > 0 ? "Coins: " + state.combo : "";
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

document.addEventListener("keydown", e => {
  if (!state.running) return;
  if (e.code === "ArrowLeft" || e.key === "a") { state.lane = Math.max(0, state.lane - 1); state.targetLaneX = laneToX(state.lane); }
  if (e.code === "ArrowRight" || e.key === "d") { state.lane = Math.min(2, state.lane + 1); state.targetLaneX = laneToX(state.lane); }
  if ((e.code === "Space" || e.code === "ArrowUp") && !state.jumping) { state.jumping = true; state.vy = JUMP_V; }
  if (e.code === "KeyR" || e.code === "ShiftLeft") startRewind();
});
document.addEventListener("keyup", e => {
  if (e.code === "KeyR" || e.code === "ShiftLeft") stopRewind();
});

let touchStart = null;
canvas.addEventListener("touchstart", e => { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() }; }, {passive:false});
canvas.addEventListener("touchend", e => {
  if (!touchStart || !state.running) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const dt = Date.now() - touchStart.t;
  if (dt < 300 && Math.abs(dx) < 30 && Math.abs(dy) < 30) {
    if (!state.jumping) { state.jumping = true; state.vy = JUMP_V; }
  } else if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
    if (dx > 0) state.lane = Math.min(2, state.lane + 1);
    else state.lane = Math.max(0, state.lane - 1);
    state.targetLaneX = laneToX(state.lane);
  } else if (dy < -30) {
    if (!state.jumping) { state.jumping = true; state.vy = JUMP_V; }
  }
  touchStart = null;
}, {passive:false});

rewindBtn.addEventListener("pointerdown", startRewind);
rewindBtn.addEventListener("pointerup", stopRewind);
rewindBtn.addEventListener("pointerleave", stopRewind);

startBtn.addEventListener("click", () => { reset(); document.querySelector("#overlay").classList.remove("game-over"); });

loop();
</script>
</body>
</html>
