<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Build Mad</title>
<style>
  :root{--bg:#1b1140;--bg2:#3a1f7a;--ink:#fff8e7;--accent:#ffd23f;--hot:#ff5d73;--cool:#3ddc97;--blue:#4cc9f0;--panel:#2a1a5e;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{margin:0;height:100%;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--ink);font-family:system-ui,sans-serif;overflow:hidden;touch-action:none}
  #wrap{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center}
  #hud{display:flex;justify-content:space-between;align-items:center;width:100%;padding:6px 10px;font-size:14px;font-weight:700;background:rgba(0,0,0,.2)}
  #hud .pill{background:var(--panel);padding:4px 10px;border-radius:99px;margin:0 3px}
  #stage{flex:1;width:100%;position:relative;overflow:hidden}
  canvas{display:block;width:100%;height:100%;background:linear-gradient(180deg,#3a1f7a,#1b1140)}
  #ui{position:absolute;inset:0;pointer-events:none}
  .panel{position:absolute;background:rgba(20,10,50,.9);border:2px solid var(--accent);border-radius:12px;padding:10px;pointer-events:auto}
  #buildPanel{left:50%;top:50%;transform:translate(-50%,-50%);width:min(92vw,520px);text-align:center}
  #buildPanel h2{margin:0 0 6px;color:var(--accent);font-size:18px}
  #grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin:8px auto;width:min(80vw,300px);aspect-ratio:5/3}
  .cell{background:#0e0830;border:1px solid #4a3a8a;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;cursor:pointer;aspect-ratio:1}
  .cell.W{background:#222;color:var(--accent)}
  .cell.G{background:#777;color:#fff}
  .cell.M{background:var(--hot);color:#fff}
  .cell.B{background:var(--blue);color:#fff}
  #tools{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin:6px 0}
  .tool{padding:6px 10px;border-radius:8px;background:var(--panel);border:2px solid transparent;font-weight:700;cursor:pointer;font-size:13px}
  .tool.sel{border-color:var(--accent)}
  .tool .c{opacity:.7;font-size:11px}
  button{background:var(--accent);color:#1b1140;border:0;padding:10px 16px;border-radius:8px;font-weight:900;cursor:pointer;font-size:14px;margin:3px}
  button.sec{background:var(--panel);color:var(--ink)}
  #drive{position:absolute;left:0;right:0;bottom:0;display:none;justify-content:space-between;padding:10px;pointer-events:none}
  #drive .btn{pointer-events:auto;width:80px;height:80px;border-radius:50%;background:var(--accent);color:#1b1140;font-weight:900;font-size:24px;display:flex;align-items:center;justify-content:center;border:0;opacity:.85}
  #drive .btn.boost{background:var(--blue);width:60px;height:60px;font-size:14px}
  #drive .right{display:flex;gap:8px;align-items:flex-end}
  #endPanel{display:none;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;min-width:240px}
  #endPanel h2{margin:0 0 6px;color:var(--accent)}
  .stars{font-size:32px;color:var(--accent);letter-spacing:6px;margin:6px 0}
  #msg{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);padding:6px 12px;border-radius:8px;font-weight:700;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none}
  #msg.show{opacity:1}
  .budget{font-size:15px}.budget.bad{color:var(--hot)}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div><span class="pill">Build Mad</span><span class="pill" id="lvl">Level 1/3</span></div>
    <div><span class="pill" id="time">0.0s</span><span class="pill budget" id="bud">8/8</span></div>
  </div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="ui">
      <div id="msg"></div>
      <div id="buildPanel" class="panel">
        <h2>Build Your Truck</h2>
        <div style="font-size:12px;opacity:.85">Tap a part, then tap grid. Bottom row = wheels.</div>
        <div id="tools"></div>
        <div id="grid"></div>
        <div><button id="go">DRIVE!</button><button class="sec" id="clr">Clear</button></div>
      </div>
      <div id="endPanel" class="panel">
        <h2 id="endTitle">Crashed!</h2>
        <div class="stars" id="endStars"></div>
        <div id="endInfo" style="font-size:13px;margin:6px 0"></div>
        <button id="retry">Rebuild &amp; Retry</button>
        <button class="sec" id="next">Next Level</button>
      </div>
      <div id="drive">
        <button class="btn" id="bL">&lt;</button>
        <div class="right"><button class="btn boost" id="bB">BOOST</button><button class="btn" id="bR">&gt;</button></div>
      </div>
    </div>
  </div>
</div>
<script>
(()=>{
"use strict";
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
function resize(){W=cv.clientWidth;H=cv.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener('resize',resize);

const LEVELS=[
  {name:"Rolling Hills",pts:(function(){const a=[];for(let x=0;x<=2400;x+=40)a.push([x,360+Math.sin(x*0.008)*40+Math.sin(x*0.02)*15]);return a;})(),goal:2300,hint:"Wheels + motor."},
  {name:"The Gap",pts:(function(){const a=[];for(let x=0;x<=600;x+=40)a.push([x,380]);for(let x=600;x<=900;x+=40)a.push([x,520]);for(let x=900;x<=2400;x+=40)a.push([x,360-Math.sin(x*0.01)*30]);return a;})(),goal:2300,hint:"Use BOOST over the gap."},
  {name:"Ramp Jump",pts:(function(){const a=[];for(let x=0;x<=800;x+=40)a.push([x,400]);for(let x=800;x<=1100;x+=20)a.push([x,400-(x-800)*0.4]);for(let x=1100;x<=1400;x+=40)a.push([x,520]);for(let x=1400;x<=2400;x+=40)a.push([x,380]);return a;})(),goal:2300,hint:"Light + boost = fly far."}
];
function terrainY(level,x){const p=level.pts;if(x<=p[0][0])return p[0][1];if(x>=p[p.length-1][0])return p[p.length-1][1];let lo=0,hi=p.length-1;while(hi-lo>1){const m=(lo+hi)>>1;if(p[m][0]<x)lo=m;else hi=m;}const a=p[lo],b=p[hi],t=(x-a[0])/(b[0]-a[0]);return a[1]+(b[1]-a[1])*t;}

const COLS=5,ROWS=3;
const PARTS={W:{cost:2,name:"Wheel"},G:{cost:1,name:"Weight"},M:{cost:3,name:"Motor"},B:{cost:3,name:"Boost"}};
const BUDGET=8;
let grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
let curTool='W',curLevel=0;

function buildCost(){let s=0;for(const r of grid)for(const c of r)if(c)s+=PARTS[c].cost;return s;}
function renderTools(){const el=document.getElementById('tools');el.innerHTML='';for(const k of Object.keys(PARTS)){const p=PARTS[k];const b=document.createElement('div');b.className='tool'+(curTool===k?' sel':'');b.innerHTML='<div>'+k+' '+p.name+'</div><div class="c">'+p.cost+'pt</div>';b.onclick=()=>{curTool=k;renderTools();};el.appendChild(b);}const er=document.createElement('div');er.className='tool'+(curTool==='X'?' sel':'');er.textContent='X Erase';er.onclick=()=>{curTool='X';renderTools();};el.appendChild(er);}
function renderGrid(){const el=document.getElementById('grid');el.innerHTML='';for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const d=document.createElement('div');const v=grid[r][c];d.className='cell'+(v?' '+v:'');d.textContent=v||'';((rr,cc)=>{d.onclick=()=>{const prev=grid[rr][cc];if(curTool==='X')grid[rr][cc]=null;else{grid[rr][cc]=curTool;if(buildCost()>BUDGET){grid[rr][cc]=prev;flash('Over budget!');}}renderGrid();updBud();};})(r,c);el.appendChild(d);}}
function updBud(){const c=buildCost();const e=document.getElementById('bud');e.textContent=c+'/'+BUDGET;e.classList.toggle('bad',c>BUDGET);}
function flash(t){const m=document.getElementById('msg');m.textContent=t;m.classList.add('show');clearTimeout(flash._t);flash._t=setTimeout(()=>m.classList.remove('show'),1200);}

const G=900,DT=1/60;
let nodes=[],sticks=[],wheels=[],nodeTypes=[],motorPow=0,hasBoost=false,boostLeft=0,boostMax=0.8;
let cam={x:0},input={l:false,r:false,boost:false};
let crashed=false,won=false,startTime=0,elapsed=0,flipT=0;

function addNode(x,y,m){nodes.push({x,y,px:x,py:y,m:m||1});return nodes.length-1;}
function addStick(a,b){const dx=nodes[a].x-nodes[b].x,dy=nodes[a].y-nodes[b].y;sticks.push({a,b,len:Math.hypot(dx,dy)});}

function buildBody(){
  nodes=[];sticks=[];wheels=[];nodeTypes=[];motorPow=0;hasBoost=false;boostLeft=0;
  const cell=28,ox=200,oy=200;
  const idMap={};
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(!grid[r][c])continue;const x=ox+c*cell,y=oy+r*cell;const t=grid[r][c];let m=1;if(t==='G')m=3;if(t==='W')m=0.8;if(t==='M'){m=1.2;motorPow+=1;}if(t==='B'){hasBoost=true;}
    const id=addNode(x,y,m);nodeTypes[id]=t;idMap[r+','+c]=id;
  }
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const k=r+','+c;if(!(k in idMap))continue;const a=idMap[k];const conn=[[0,1],[1,0],[1,1],[1,-1]];for(let i=0;i<conn.length;i++){const k2=(r+conn[i][0])+','+(c+conn[i][1]);if(k2 in idMap)addStick(a,idMap[k2]);}}
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(grid[r][c]==='W'){wheels.push({n:idMap[r+','+c],r:14,ang:0,spin:0});}}
  if(nodes.length===0){const a=addNode(ox,oy);const b=addNode(ox+cell,oy);addStick(a,b);wheels.push({n:a,r:12,ang:0,spin:0});}
  // brace edges for rigidity
  const ids=Object.values(idMap);if(ids.length>=2){addStick(ids[0],ids[ids.length-1]);}
}

function step(){
  for(let i=0;i<nodes.length;i++){const n=nodes[i];const vx=(n.x-n.px)*0.99,vy=(n.y-n.py)*0.99;n.px=n.x;n.py=n.y;n.x+=vx;n.y+=vy+G*DT*DT;}
  const lvl=LEVELS[curLevel];
  let ax=0;
  if(input.r)ax+=(motorPow||0.4)*40;
  if(input.l)ax-=(motorPow||0.4)*40;
  if(input.boost&&hasBoost&&boostLeft>0){ax+=180;boostLeft-=DT;}
  for(let i=0;i<wheels.length;i++){const n=nodes[wheels[i].n];n.x+=ax*DT*DT*60;}
  for(let it=0;it<5;it++){
    for(let i=0;i<sticks.length;i++){const s=sticks[i],a=nodes[s.a],b=nodes[s.b];const dx=b.x-a.x,dy=b.y-a.y;const d=Math.hypot(dx,dy)||0.001;const diff=(d-s.len)/d*0.5;const ma=1/a.m,mb=1/b.m,sum=ma+mb;a.x+=dx*diff*(ma/sum);a.y+=dy*diff*(ma/sum);b.x-=dx*diff*(mb/sum);b.y-=dy*diff*(mb/sum);}
    for(let i=0;i<nodes.length;i++){const n=nodes[i];const gy=terrainY(lvl,n.x);if(n.y>gy){n.y=gy;const vx=n.x-n.px;n.px=n.x-vx*0.7;}}
    for(let i=0;i<wheels.length;i++){const w=wheels[i],n=nodes[w.n];const gy=terrainY(lvl,n.x);if(n.y+w.r>gy){n.y=gy-w.r;const vx=n.x-n.px;n.px=n.x-vx*0.92;w.spin=vx;}}
  }
  let avgY=0,maxX=-Infinity,minX=Infinity;for(let i=0;i<nodes.length;i++){avgY+=nodes[i].y;if(nodes[i].x>maxX)maxX=nodes[i].x;if(nodes[i].x<minX)minX=nodes[i].x;}avgY/=nodes.length;
  if(avgY>800){crashed=true;}
  if(nodes.length>=2){const a=nodes[0],b=nodes[nodes.length-1];const ang=Math.abs(Math.atan2(b.y-a.y,b.x-a.x));if(ang>1.3){flipT+=DT;if(flipT>0.7)crashed=true;}else flipT=Math.max(0,flipT-DT);}
  if(maxX>=lvl.goal)won=true;
  cam.x=maxX-W*0.35;
  elapsed=(performance.now()-startTime)/1000;
  document.getElementById('time').textContent=elapsed.toFixed(1)+'s';
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const lvl=LEVELS[curLevel];
  ctx.fillStyle='rgba(255,255,255,.3)';for(let i=0;i<25;i++){const sx=((i*97)%W),sy=((i*53)%(H*0.4));ctx.fillRect(sx,sy,2,2);}
  ctx.save();ctx.translate(-cam.x,0);
  ctx.fillStyle='#5a3aaa';ctx.beginPath();ctx.moveTo(lvl.pts[0][0],H+200);for(let i=0;i<lvl.pts.length;i++)ctx.lineTo(lvl.pts[i][0],lvl.pts[i][1]);ctx.lineTo(lvl.pts[lvl.pts.length-1][0],H+200);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#ffd23f';ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<lvl.pts.length;i++){const p=lvl.pts[i];if(i===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1]);}ctx.stroke();
  const gx=lvl.goal,gy=terrainY(lvl,gx);ctx.fillStyle='#3ddc97';ctx.fillRect(gx-2,gy-60,4,60);ctx.beginPath();ctx.moveTo(gx,gy-60);ctx.lineTo(gx+30,gy-50);ctx.lineTo(gx,gy-40);ctx.fill();
  ctx.strokeStyle='#fff8e7';ctx.lineWidth=3;for(let i=0;i<sticks.length;i++){const s=sticks[i],a=nodes[s.a],b=nodes[s.b];ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
  for(let i=0;i<nodes.length;i++){const n=nodes[i],t=nodeTypes[i];if(!t||t==='W')continue;let col='#fff';if(t==='G')col='#888';else if(t==='M')col='#ff5d73';else if(t==='B')col='#4cc9f0';ctx.fillStyle=col;ctx.fillRect(n.x-11,n.y-11,22,22);ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,n.x,n.y);}
  for(let i=0;i<wheels.length;i++){const w=wheels[i],n=nodes[w.n];ctx.save();ctx.translate(n.x,n.y);w.ang+=w.spin*0.05;ctx.rotate(w.ang);ctx.fillStyle='#222';ctx.beginPath();ctx.arc(0,0,w.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ffd23f';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-w.r,0);ctx.lineTo(w.r,0);ctx.moveTo(0,-w.r);ctx.lineTo(0,w.r);ctx.stroke();ctx.restore();}
  ctx.restore();
  if(hasBoost){ctx.fillStyle='#4cc9f0';ctx.fillRect(10,H-20,Math.max(0,boostLeft/boostMax)*120,8);ctx.strokeStyle='#fff';ctx.strokeRect(10,H-20,120,8);}
}

let mode='build';
function loop(){if(mode==='drive'){step();draw();if(crashed||won)endRun();}requestAnimationFrame(loop);}

function startDrive(){
  if(buildCost()>BUDGET){flash('Over budget!');return;}
  let hasW=false;for(const r of grid)for(const c of r)if(c==='W')hasW=true;
  if(!hasW){flash('Need at least 1 wheel!');return;}
  buildBody();if(hasBoost)boostLeft=boostMax;
  mode='drive';crashed=false;won=false;flipT=0;startTime=performance.now();
  document.getElementById('buildPanel').style.display='none';
  document.getElementById('endPanel').style.display='none';
  document.getElementById('drive').style.display='flex';
  flash(LEVELS[curLevel].hint);
}
function endRun(){
  mode='end';
  document.getElementById('drive').style.display='none';
  const ep=document.getElementById('endPanel');ep.style.display='block';
  document.getElementById('endTitle').textContent=won?'Finished!':'Crashed!';
  let stars=0;if(won){stars=1;if(elapsed<25)stars++;if(buildCost()<=5)stars++;}
  document.getElementById('endStars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('endInfo').textContent='Time '+elapsed.toFixed(1)+'s · Cost '+buildCost()+'pt';
  document.getElementById('next').style.display=(won&&curLevel<LEVELS.length-1)?'inline-block':'none';
  try{localStorage.setItem('buildmad_l'+curLevel,Math.max(stars,+localStorage.getItem('buildmad_l'+curLevel)||0));}catch(e){}
}
function backToBuild(){
  mode='build';
  document.getElementById('buildPanel').style.display='block';
  document.getElementById('endPanel').style.display='none';
  document.getElementById('drive').style.display='none';
  document.getElementById('lvl').textContent='Level '+(curLevel+1)+'/'+LEVELS.length;
}

function bindHold(id,fn){const el=document.getElementById(id);const on=e=>{e.preventDefault();fn(true);};const off=e=>{e.preventDefault();fn(false);};el.addEventListener('touchstart',on,{passive:false});el.addEventListener('touchend',off);el.addEventListener('touchcancel',off);el.addEventListener('mousedown',on);el.addEventListener('mouseup',off);el.addEventListener('mouseleave',off);}
bindHold('bL',v=>input.l=v);bindHold('bR',v=>input.r=v);
document.getElementById('bB').addEventListener('click',()=>{if(hasBoost&&boostLeft<=0)boostLeft=boostMax;input.boost=true;setTimeout(()=>input.boost=false,boostMax*1000);});
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')input.l=true;if(e.key==='ArrowRight')input.r=true;if(e.key===' '){if(hasBoost&&boostLeft<=0)boostLeft=boostMax;input.boost=true;e.preventDefault();}});
window.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')input.l=false;if(e.key==='ArrowRight')input.r=false;if(e.key===' ')input.boost=false;});

document.getElementById('go').onclick=startDrive;
document.getElementById('clr').onclick=()=>{grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));renderGrid();updBud();};
document.getElementById('retry').onclick=backToBuild;
document.getElementById('next').onclick=()=>{curLevel=Math.min(LEVELS.length-1,curLevel+1);grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));renderGrid();updBud();backToBuild();};

function preset(){grid[2][1]='W';grid[2][3]='W';grid[1][2]='M';}
preset();renderTools();renderGrid();updBud();resize();
document.getElementById('lvl').textContent='Level 1/'+LEVELS.length;
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
